<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skyline Drop — скачать</title>
  <meta name="description" content="Skyline Drop — мгновенная передача файлов по Wi‑Fi между Windows и Android." />
  <link rel="icon" href="assets/icon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050a12;
      --ink: #e8f1ff;
      --muted: #9bb0c9;
      --cyan: #00e5ff;
      --blue: #3d7eff;
      --line: rgba(0, 229, 255, 0.28);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: "Outfit", system-ui, sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      min-height: 100svh;
      display: grid;
      align-items: end;
      isolation: isolate;
    }

    .hero-media {
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(180deg, rgba(5, 10, 18, 0.25) 0%, rgba(5, 10, 18, 0.55) 42%, rgba(5, 10, 18, 0.92) 78%, #050a12 100%),
        url("assets/hero.png") center / cover no-repeat;
      transform: scale(1.04);
      animation: drift 18s ease-in-out infinite alternate;
    }

    .hero-media::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 45% at 70% 20%, rgba(61, 126, 255, 0.22), transparent 60%),
        radial-gradient(ellipse 50% 40% at 15% 70%, rgba(0, 229, 255, 0.12), transparent 55%);
      pointer-events: none;
    }

    .scanline {
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 3px,
        rgba(255, 255, 255, 0.015) 3px,
        rgba(255, 255, 255, 0.015) 4px
      );
      opacity: 0.5;
      mix-blend-mode: soft-light;
    }

    .beam {
      position: absolute;
      top: 18%;
      left: -10%;
      width: 55%;
      height: 2px;
      z-index: -1;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0;
      transform: rotate(-12deg);
      animation: beam 4.5s ease-in-out 0.8s infinite;
      filter: blur(0.4px);
    }

    .content {
      width: min(1120px, calc(100% - 2.5rem));
      margin: 0 auto;
      padding: 0 0 clamp(2.5rem, 7vh, 4.5rem);
      display: grid;
      gap: 1.25rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      opacity: 0;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .brand img {
      width: clamp(42px, 6vw, 56px);
      height: clamp(42px, 6vw, 56px);
      border-radius: 14px;
      box-shadow: 0 0 0 1px rgba(0, 229, 255, 0.25);
    }

    .brand-name {
      font-family: "Syne", sans-serif;
      font-weight: 800;
      font-size: clamp(1.85rem, 4.8vw, 3.35rem);
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(120deg, #ffffff 20%, var(--cyan) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    h1 {
      font-family: "Syne", sans-serif;
      font-weight: 700;
      font-size: clamp(1.55rem, 3.6vw, 2.55rem);
      letter-spacing: -0.03em;
      line-height: 1.12;
      max-width: 16ch;
      opacity: 0;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.25s forwards;
    }

    .lede {
      max-width: 38ch;
      color: var(--muted);
      font-weight: 300;
      font-size: clamp(1rem, 1.7vw, 1.2rem);
      line-height: 1.5;
      opacity: 0;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
    }

    .cta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      margin-top: 0.55rem;
      opacity: 0;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
    }

    .btn {
      appearance: none;
      border: 0;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      min-height: 3.15rem;
      padding: 0 1.35rem;
      border-radius: 999px;
      font-family: "Outfit", sans-serif;
      font-weight: 600;
      font-size: 0.98rem;
      letter-spacing: 0.01em;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      color: #041018;
      background: linear-gradient(120deg, var(--cyan), var(--blue));
      box-shadow: 0 10px 30px rgba(0, 229, 255, 0.18);
    }

    .btn-primary:hover {
      box-shadow: 0 14px 36px rgba(61, 126, 255, 0.28);
    }

    .btn-ghost {
      color: var(--ink);
      background: rgba(8, 16, 28, 0.45);
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .btn-ghost:hover {
      border-color: rgba(0, 229, 255, 0.55);
      background: rgba(10, 22, 40, 0.7);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .meta {
      margin-top: 0.35rem;
      color: rgba(155, 176, 201, 0.75);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes drift {
      from { transform: scale(1.04) translate3d(0, 0, 0); }
      to { transform: scale(1.08) translate3d(-1.2%, -0.8%, 0); }
    }

    @keyframes beam {
      0%, 100% { opacity: 0; transform: translateX(0) rotate(-12deg); }
      20% { opacity: 0.85; }
      55% { opacity: 0.35; transform: translateX(45vw) rotate(-12deg); }
      80% { opacity: 0; transform: translateX(70vw) rotate(-12deg); }
    }

    @media (max-width: 640px) {
      .content { width: min(1120px, calc(100% - 1.5rem)); }
      .cta { flex-direction: column; align-items: stretch; }
      .btn { width: 100%; }
      h1 { max-width: 14ch; }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-media, .beam, .brand, h1, .lede, .cta, .meta {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="hero-media" aria-hidden="true"></div>
    <div class="scanline" aria-hidden="true"></div>
    <div class="beam" aria-hidden="true"></div>

    <div class="content">
      <div class="brand">
        <img src="assets/icon.png" alt="" width="56" height="56" />
        <div class="brand-name">Skyline Drop</div>
      </div>

      <h1>Файлы летят по Wi‑Fi как луч между устройствами</h1>

      <p class="lede">
        Мгновенный обмен между Windows и Android в одной сети — без облака и без кабелей.
      </p>

      <div class="cta">
        <!--
          GitHub Pages / Releases:
          подставьте свои URL ниже (или оставьте относительные пути,
          если APK/EXE лежат в /downloads рядом с этой страницей).
        -->
        <a
          class="btn btn-primary"
          id="btn-windows"
          href="https://disk.yandex.ru/d/gX6ZJPPXCQbejg"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 6.5h16v11H4v-11Z" stroke="currentColor" stroke-width="1.7"/>
            <path d="M8 17.5V20h8v-2.5" stroke="currentColor" stroke-width="1.7"/>
            <path d="M8 10h3.2V7H8v3Zm4.8 0H16V7h-3.2v3Z" fill="currentColor"/>
          </svg>
          Скачать для Windows
        </a>
        <a
          class="btn btn-ghost"
          id="btn-android"
          href="https://disk.yandex.ru/d/IZ8zvp_97bEQYQ"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="7" y="3.5" width="10" height="17" rx="2.2" stroke="currentColor" stroke-width="1.7"/>
            <path d="M10 18.5h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
          Скачать APK для Android
        </a>
      </div>

      <p class="meta">EXE · APK · LAN · без аккаунта</p>
    </div>
  </main>

  <script>
    // Ссылки скачивания для GitHub Pages / Releases.
    // Замените YOUR_USER / YOUR_REPO на свои — или оставьте пустым,
    // тогда останутся относительные пути ./downloads/...
    const GITHUB = {
      user: "YOUR_USER",
      repo: "YOUR_REPO",
      // true = брать файлы из Releases (latest)
      // false = файлы из папки downloads на GitHub Pages
      useReleases: false,
      windowsFile: "SkylineDropSetup.exe",
      androidFile: "SkylineDrop.apk",
    };

    (function applyDownloadLinks() {
      const win = document.getElementById("btn-windows");
      const and = document.getElementById("btn-android");
      if (!win || !and) return;

      const { user, repo, useReleases, windowsFile, androidFile } = GITHUB;
      const configured = user !== "YOUR_USER" && repo !== "YOUR_REPO";

      if (configured && useReleases) {
        const base = `https://github.com/${user}/${repo}/releases/latest/download`;
        win.href = `${base}/${windowsFile}`;
        and.href = `${base}/${androidFile}`;
      } else if (configured && !useReleases) {
        const base = `https://${user}.github.io/${repo}/downloads`;
        win.href = `${base}/${windowsFile}`;
        and.href = `${base}/${androidFile}`;
      }
      // иначе остаются относительные href из HTML — удобно для локального Pages root
    })();
  </script>
</body>
</html>
